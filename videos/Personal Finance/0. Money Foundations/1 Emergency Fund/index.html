<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=392, height=768" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 392px;
        height: 768px;
        overflow: hidden;
        background: #000;
      }
    </style>
    <style type="text/tailwindcss">
      @theme {
        --font-sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
    </style>
    <script>
      window.__tailwindReady = new Promise(function (resolve) {
        var loaded = document.readyState === "complete";
        var resolved = false;
        var observer;
        function readTailwindCss() {
          var styles = document.querySelectorAll("style");
          for (var i = styles.length - 1; i >= 0; i--) {
            var text = styles[i].textContent || "";
            if (text.indexOf("tailwindcss v") !== -1) return text;
          }
          return "";
        }
        function finish() {
          if (resolved || !loaded || !readTailwindCss()) return;
          resolved = true;
          if (observer) observer.disconnect();
          resolve(true);
        }
        observer = new MutationObserver(finish);
        observer.observe(document.documentElement, { childList: true, subtree: true, characterData: true });
        if (loaded) {
          finish();
        } else {
          window.addEventListener("load", function () {
            loaded = true;
            finish();
          }, { once: true });
        }
      });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.2.4/dist/index.global.js" integrity="sha384-v5YF9xS+gLRWdvrQ0u/WRbCkjSIH0NjHIPe8tBL1ZRrmI7PiSH6LLdzs0aAIMCuh" crossorigin="anonymous"></script>
  </head>
  <body class="m-0 h-[768px] w-[392px] overflow-hidden bg-black">
    <div
      id="root"
      class="relative h-[768px] w-[392px] overflow-hidden bg-[#020617] font-sans text-[#f8fafc]"
      data-composition-id="main"
      data-start="0"
      data-duration="10"
      data-width="392"
      data-height="768"
    >
      <div class="pointer-events-none absolute inset-0 bg-gradient-to-br from-[#0c4a6e]/70 via-[#0f172a]/90 to-[#020617]"></div>
      <div class="pointer-events-none absolute inset-0 bg-[radial-gradient(circle_at_80%_22%,rgba(244,191,79,0.28),transparent_32%)]"></div>
      <section id="title-card" class="clip absolute left-8 top-[230px] w-[328px] rounded-lg bg-[#020617] p-5 shadow-2xl ring-1 ring-[#ffffff1a]" data-start="0" data-duration="10" data-track-index="1">
        <div class="mb-[14px] text-sm uppercase leading-tight text-[#f4bf4f]">Demo Video</div>
        <h1 class="text-balance text-[44px] font-[760] leading-[1.02] text-[#f8fafc]">Emergency Funds</h1>
        <p class="mt-[22px] text-[17px] leading-tight text-[#dbeafe]">Personal Finance / 0. Money Foundations / video1</p>
      </section>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      tl.from("#title-card", { opacity: 0, y: 36, duration: 0.9, ease: "power2.out" }, 0);
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
